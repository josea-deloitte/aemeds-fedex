<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Table Draft</title>
    <script nonce="aem" src="/scripts/aem.js" type="module"></script>
    <script nonce="aem" src="/scripts/scripts.js" type="module"></script>
    <link rel="stylesheet" href="/styles/styles.css">
  </head>
  <body>
    <main>
      <div>
        <h1>Advanced Table</h1>
        <h2>With header</h2>
        <div class="advanced-table">
          <div>
            <div>Service</div>
            <div>Delivery time</div>
            <div>Price</div>
          </div>
          <div>
            <div>FedEx Priority Overnight</div>
            <div>Next business day</div>
            <div>$$$</div>
          </div>
          <div>
            <div>FedEx Ground</div>
            <div>1-5 business days</div>
            <div>$</div>
          </div>
        </div>
        <h2>No header (icon tiles)</h2>
        <div class="advanced-table no-header">
          <div>
            <div>
              <p><span class="icon icon-box"></span></p>
              <p><a href="/en-us/shipping/dropoff.html">Drop off a package</a></p>
            </div>
            <div>
              <p><span class="icon icon-redirect"></span></p>
              <p><a href="/en-us/delivery-manager.html">Redirect a package</a></p>
            </div>
            <div>
              <p><span class="icon icon-return"></span></p>
              <p><a href="/en-us/returns.html">Return a package</a></p>
            </div>
            <div>
              <p><span class="icon icon-store"></span></p>
              <p><a href="/en-us/locations.html">Find a location</a></p>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
