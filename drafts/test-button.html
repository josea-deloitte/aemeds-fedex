<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Draft</title>
    <script nonce="aem" src="/scripts/aem.js" type="module"></script>
    <script nonce="aem" src="/scripts/scripts.js" type="module"></script>
    <link rel="stylesheet" href="/styles/styles.css">
  </head>
  <body>
    <main>
      <div>
        <h1>Button</h1>

        <h2>Default (text link)</h2>
        <div class="button">
          <div>
            <div><a href="https://www.fedex.com/en-us/shipping/drop-off-package.html">drop off a package</a></div>
          </div>
        </div>

        <h2>Primary</h2>
        <div class="button primary">
          <div>
            <div><a href="https://www.fedex.com/en-us/online/rating.html">Get a quote</a></div>
          </div>
        </div>

        <h2>Outline (orange) — matches "Start shipping now"</h2>
        <div class="button outline">
          <div>
            <div><a href="https://www.fedex.com/en-us/shipping/ship-manager/login.html">Start shipping now</a></div>
          </div>
        </div>

        <h2>Secondary (generic dark outline)</h2>
        <div class="button secondary">
          <div>
            <div><a href="https://www.fedex.com/en-us/shipping/ship-manager/login.html">Start shipping now</a></div>
          </div>
        </div>

        <h2>Accent</h2>
        <div class="button accent">
          <div>
            <div><a href="https://www.fedex.com/en-us/rewards.html">Open a free account</a></div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
