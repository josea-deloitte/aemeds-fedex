<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications Draft</title>
    <script nonce="aem" src="/scripts/aem.js" type="module"></script>
    <script nonce="aem" src="/scripts/scripts.js" type="module"></script>
    <link rel="stylesheet" href="/styles/styles.css">
  </head>
  <body>
    <main>
      <div>
        <h1>Notifications</h1>
        <div class="notifications">
          <div>
            <div>
              <p>IEEPA tariff refund update. <a href="https://www.fedex.com/en-us/shipping/international/us-tariffs-impact.html">Customer portal live now.</a></p>
            </div>
          </div>
        </div>
        <div class="notifications success">
          <div>
            <div>
              <p>Your shipment was delivered successfully.</p>
            </div>
          </div>
        </div>
        <div class="notifications warning">
          <div>
            <div>
              <p>Severe weather may delay deliveries in your area.</p>
            </div>
          </div>
        </div>
        <div class="notifications error">
          <div>
            <div>
              <p>We couldn't process your tracking number. <a href="/en-us/customer-support.html">Contact support</a>.</p>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
